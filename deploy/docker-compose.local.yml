services:
  postgres:
    image: postgres:16-alpine
    container_name: tbs-postgres-local
    environment:
      POSTGRES_DB: tbs
      POSTGRES_USER: tbs
      POSTGRES_PASSWORD: tbs
    ports:
      - "5432:5432"
    volumes:
      - tbs_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbs -d tbs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tbs_pg_data:
