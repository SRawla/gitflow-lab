kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tbs
nodes:
  - role: control-plane
    # Allow nginx-ingress to bind to host ports 80 and 443
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
