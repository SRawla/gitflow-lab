name: Deploy DEV

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (from build output)"
        required: true
        type: string

jobs:
  deploy-dev:
    name: "Deploy ${{ inputs.image_tag }} to DEV"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: read

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1

      - name: Create namespace if missing
        run: |
          kubectl create namespace tbs-dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        run: |
          helm upgrade --install dev chart/tbs \
            -f chart/tbs/values-dev.yaml \
            --set image.tag=${{ inputs.image_tag }} \
            --set image.pullPolicy=IfNotPresent \
            --namespace tbs-dev \
            --wait --timeout 180s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/dev -n tbs-dev --timeout=90s
          echo "Deployed ${{ inputs.image_tag }} to tbs-dev (dev.tbs.local:8080)"

      - name: Smoke test
        run: |
          echo "Waiting for app to become ready..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://dev.tbs.local:8080/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Smoke test passed — /actuator/health returned 200"
              exit 0
            fi
            echo "  attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "::error::Smoke test failed — /actuator/health did not return 200 after 60s"
          kubectl logs deployment/dev -n tbs-dev --tail=50
          exit 1
