name: Drift Check

# Daily cron — alerts if develop has fallen behind qa (GR3 guard rail)
on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC every day
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  drift-check:
    name: Check develop is not behind qa
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      issues: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch --all

      - name: Check drift
        id: drift
        run: |
          BEHIND=$(git log origin/develop..origin/qa --oneline | wc -l | tr -d ' ')
          echo "drift_count=$BEHIND" >> $GITHUB_OUTPUT

          if [[ "$BEHIND" -gt "0" ]]; then
            echo "⚠️ develop is $BEHIND commits behind qa"
          else
            echo "✅ develop is in sync with qa"
          fi

      - name: Open GitHub issue if drifted
        if: steps.drift.outputs.drift_count != '0'
        run: |
          COUNT="${{ steps.drift.outputs.drift_count }}"
          EXISTING=$(gh issue list --label "drift-alert" --state open --json number --jq '.[0].number')

          if [[ -n "$EXISTING" ]]; then
            echo "Issue #$EXISTING already open — skipping duplicate"
          else
            gh issue create \
              --title "⚠️ Drift detected: develop is ${COUNT} commits behind qa" \
              --body "**Drift alert** — \`develop\` has fallen behind \`qa\` by ${COUNT} commits.

**Action required:** Check if \`sync-qa-to-develop\` workflow failed or was skipped.
Run the sync manually or open a PR from \`qa\` → \`develop\`.

_Auto-detected by drift-check workflow on $(date -u +%Y-%m-%d)_" \
              --label "drift-alert"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close drift issue if resolved
        if: steps.drift.outputs.drift_count == '0'
        run: |
          EXISTING=$(gh issue list --label "drift-alert" --state open --json number --jq '.[0].number')
          if [[ -n "$EXISTING" ]]; then
            gh issue close "$EXISTING" --comment "✅ Drift resolved — develop is back in sync with qa."
            echo "Closed drift issue #$EXISTING"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
