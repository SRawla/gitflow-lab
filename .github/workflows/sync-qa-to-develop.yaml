name: "GR1: Sync QA to Develop"

on:
  push:
    branches:
      - qa

jobs:
  forward-port:
    name: Cherry-pick to develop
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cherry-pick and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT="${{ github.sha }}"
          SHORT_SHA="${COMMIT:0:7}"
          COMMIT_MSG=$(git log -1 --format='%s' "$COMMIT")

          # Loop prevention: skip commits that came from auto-qa-pr (develop -> qa)
          if [[ "$COMMIT_MSG" == *"[auto-promote]"* ]]; then
            echo "Skipping: commit is an auto-promote from develop, no need to sync back"
            exit 0
          fi

          # Loop prevention: skip commits that came from forward-port (GR2 release -> qa)
          if [[ "$COMMIT_MSG" == *"[forward-port]"* ]]; then
            echo "Skipping: commit is a forward-port from release branch, no need to re-sync to develop"
            exit 0
          fi

          BRANCH_NAME="forward-port/${SHORT_SHA}"

          git fetch origin develop
          git checkout -b "$BRANCH_NAME" origin/develop

          if ! git cherry-pick "$COMMIT" --allow-empty; then
            echo "Cherry-pick conflict detected"
            git cherry-pick --abort
            git checkout -- . 2>/dev/null || true

            git commit --allow-empty -m "[forward-port] CONFLICT: $COMMIT_MSG"
            git push origin "$BRANCH_NAME"

            AUTHOR=$(git log -1 --format='%an' "$COMMIT")

            BODY="Cherry-pick of \`$SHORT_SHA\` from qa failed due to conflicts."
            BODY="$BODY"$'\n\n'"**Author:** $AUTHOR"
            BODY="$BODY"$'\n'"**Source commit:** $COMMIT"
            BODY="$BODY"$'\n\n'"Please resolve manually."

            gh pr create \
              --title "[forward-port] CONFLICT: $COMMIT_MSG" \
              --body "$BODY" \
              --base develop \
              --head "$BRANCH_NAME" \
              --draft
            exit 0
          fi

          git commit --amend -m "[forward-port] $COMMIT_MSG"
          git push origin "$BRANCH_NAME"

          BODY="Auto cherry-pick of \`$SHORT_SHA\` from qa to develop. Merge to keep develop in sync with qa bugfixes."

          gh pr create \
            --title "[forward-port] $COMMIT_MSG" \
            --body "$BODY" \
            --base develop \
            --head "$BRANCH_NAME"
