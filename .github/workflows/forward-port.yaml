name: "GR2: Forward-port"

on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9].[0-9][0-9].*"

jobs:
  forward-port:
    name: "Forward-port to qa + develop"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Forward-port release branch to qa and develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(echo "$TAG" | sed 's/^v\([0-9]\{4\}\.[0-9]\{2\}\)\..*$/\1/')
          PATCH=$(echo "$TAG" | sed 's/^v[0-9]\{4\}\.[0-9]\{2\}\.\(.*\)$/\1/')
          RELEASE_BRANCH="release/${VERSION}"

          # TASK-04: Skip .0 tags — release branch doesn't exist yet at this point
          # and there are no release-branch patches to forward-port for the initial tag.
          if [ "$PATCH" = "0" ]; then
            echo "Skipping forward-port for initial release tag $TAG (.0 has no release-branch patches yet)"
            exit 0
          fi

          git fetch origin "$RELEASE_BRANCH" qa develop

          if ! git rev-parse "origin/${RELEASE_BRANCH}" &>/dev/null; then
            echo "::error::Release branch $RELEASE_BRANCH not found"
            exit 1
          fi

          # TASK-05: Cherry-pick commits from release branch that are not in the target,
          # instead of merging the whole branch (avoids bringing master merge commit history).
          TARGETS=("qa" "develop")

          for TARGET in "${TARGETS[@]}"; do
            FP_BRANCH="forward-port/${VERSION}-to-${TARGET}-${TAG}"

            echo "--- Forward-porting $RELEASE_BRANCH to $TARGET (cherry-pick) ---"

            # Find commits on release branch not yet in target, excluding merge commits
            COMMITS=$(git log "origin/${TARGET}..origin/${RELEASE_BRANCH}" \
              --no-merges --format="%H" --reverse)

            if [ -z "$COMMITS" ]; then
              echo "No new commits on $RELEASE_BRANCH since $TARGET diverged — skipping $TARGET"
              continue
            fi

            git checkout -b "$FP_BRANCH" "origin/${TARGET}"

            CONFLICT=0
            for COMMIT in $COMMITS; do
              COMMIT_MSG=$(git log -1 --format='%s' "$COMMIT")
              if ! git cherry-pick "$COMMIT" --allow-empty; then
                echo "Cherry-pick conflict on $COMMIT"
                git cherry-pick --abort 2>/dev/null || true
                # Create placeholder conflict commit for PR context
                git checkout -- . 2>/dev/null || true
                git commit --allow-empty -m "[forward-port] CONFLICT: $COMMIT_MSG"
                CONFLICT=1
                break
              else
                # Amend commit message with [forward-port] prefix if not already present
                CURRENT_MSG=$(git log -1 --format='%s')
                if [[ "$CURRENT_MSG" != \[forward-port\]* ]]; then
                  git commit --amend -m "[forward-port] $CURRENT_MSG"
                fi
              fi
            done

            git push origin "$FP_BRANCH"

            if [ "$CONFLICT" -eq 1 ]; then
              BODY="Auto forward-port triggered by tag \`${TAG}\`. Cherry-pick conflict detected. Resolve manually before merging."
              gh pr create \
                --title "[forward-port] CONFLICT: ${RELEASE_BRANCH} to ${TARGET} (${TAG})" \
                --body "$BODY" \
                --base "$TARGET" \
                --head "$FP_BRANCH" \
                --draft
              echo "Conflict PR opened: $FP_BRANCH to $TARGET"
            else
              BODY="Auto forward-port triggered by tag \`${TAG}\`. Cherry-picks all patches from \`${RELEASE_BRANCH}\` into \`${TARGET}\`. Auto-merge if checks pass."
              gh pr create \
                --title "[forward-port] ${RELEASE_BRANCH} to ${TARGET} (${TAG})" \
                --body "$BODY" \
                --base "$TARGET" \
                --head "$FP_BRANCH"
              echo "PR opened: $FP_BRANCH to $TARGET"
            fi

            git checkout --detach
          done
