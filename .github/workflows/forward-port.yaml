name: Forward Port on Tag

on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9].[0-9][0-9].*"

jobs:
  forward-port:
    name: "Forward port ${{ github.ref_name }}"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release line from tag
        id: resolve
        run: |
          TAG="${{ github.ref_name }}"
          LINE="${TAG#v}"
          MAJOR=$(echo "$LINE" | cut -d. -f1,2)
          SOURCE="release/${MAJOR}"
          echo "release_line=$MAJOR"  >> $GITHUB_OUTPUT
          echo "source=$SOURCE"       >> $GITHUB_OUTPUT

      - name: Fetch all branches
        run: git fetch --all

      - name: Open forward-port PR to qa
        run: |
          SOURCE="${{ steps.resolve.outputs.source }}"
          TAG="${{ github.ref_name }}"
          BRANCH="forward-port/${TAG}-to-qa"

          git checkout "$SOURCE"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          gh pr create \
            --title "forward-port: $TAG to qa" \
            --body "Auto forward-port of release branch ${SOURCE} after tag ${TAG}. This ensures qa gets all patches from this release line. Review and merge." \
            --base qa \
            --head "$BRANCH" \
            --label "forward-port"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open forward-port PR to develop
        run: |
          SOURCE="${{ steps.resolve.outputs.source }}"
          TAG="${{ github.ref_name }}"
          BRANCH="forward-port/${TAG}-to-develop"

          git checkout "$SOURCE"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          gh pr create \
            --title "forward-port: $TAG to develop" \
            --body "Auto forward-port of release branch ${SOURCE} after tag ${TAG}. This ensures develop gets all patches from this release line. Review and merge." \
            --base develop \
            --head "$BRANCH" \
            --label "forward-port"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
