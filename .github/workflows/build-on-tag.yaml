name: "Build on Tag"

on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9].[0-9][0-9].*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: srawla/tbs

jobs:
  build:
    name: "Build ${{ github.ref_name }}"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      packages: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Verify Java 21
        run: |
          JAVA_VER=$(java -version 2>&1 | head -1)
          echo "Java: $JAVA_VER"
          if ! java -version 2>&1 | grep -q '"21'; then
            echo "::error::Java 21 required but found: $JAVA_VER"
            exit 1
          fi
          echo "✅ Java 21 available (machine-installed, no download needed)"

      - name: Run tests and build JAR
        # 'verify' runs: compile → test → package → verify in one pass.
        # The JAR is produced in target/ — no second mvn invocation needed.
        run: ./mvnw -B verify

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} .

      - name: Load image into kind
        run: |
          kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} --name tbs

      - name: Summary
        run: |
          echo "## Tag Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | $(git rev-parse --short=7 HEAD) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ready to deploy: run \`Deploy PROD\` with tag \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
