name: Auto QA PR

on:
  push:
    branches:
      - develop

jobs:
  create-qa-pr:
    name: Cherry-pick to QA
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cherry-pick and open PR
        run: |
          COMMIT="${{ github.sha }}"
          SHORT_SHA="${COMMIT:0:7}"
          COMMIT_MSG=$(git log -1 --format='%s' "$COMMIT")

          # Loop prevention: skip commits that came from GR1 (qa → develop sync)
          if [[ "$COMMIT_MSG" == *"[forward-port]"* ]]; then
            echo "Skipping: commit is a forward-port from qa, no need to promote back"
            exit 0
          fi

          BRANCH_NAME="qa-promote/${SHORT_SHA}"

          git fetch origin qa
          git checkout -b "$BRANCH_NAME" origin/qa

          if ! git cherry-pick "$COMMIT" --allow-empty; then
            echo "Cherry-pick conflict detected"
            git cherry-pick --abort
            git commit --allow-empty -m "CONFLICT: cherry-pick of $SHORT_SHA failed"
            git push origin "$BRANCH_NAME"

            gh pr create \
              --title "CONFLICT [auto-promote] $COMMIT_MSG" \
              --body "Cherry-pick of $SHORT_SHA from develop failed due to conflicts. Resolve manually.\nSource commit: $COMMIT" \
              --base qa \
              --head "$BRANCH_NAME" \
              --draft
            exit 0
          fi

          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "[auto-promote] $COMMIT_MSG" \
            --body "Auto cherry-pick of $SHORT_SHA from develop.\nMerge when ready. Close if this should not go to qa." \
            --base qa \
            --head "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
