name: "Release: Open QA to Master PR"

on:
  workflow_dispatch:

jobs:
  open-pr:
    name: Open release PR
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin master qa

          AHEAD=$(git rev-list --count origin/master..origin/qa)
          if [ "$AHEAD" -eq 0 ]; then
            echo "::error::qa has no new commits over master. Nothing to release."
            exit 1
          fi

          VERSION=$(date +%Y.%m)
          COMMIT_LOG=$(git log --oneline origin/master..origin/qa | head -20)

          BODY="## Release promotion: qa to master"
          BODY="$BODY"$'\n\n'"**Commits ahead:** ${AHEAD}"
          BODY="$BODY"$'\n\n'"Commit log (max 20):"
          BODY="$BODY"$'\n'"${COMMIT_LOG}"
          BODY="$BODY"$'\n\n'"**After merge:** run the Release Tag + Fork workflow with version \`${VERSION}\`."

          gh pr create \
            --title "Release v${VERSION}.0 - promote QA to master" \
            --body "$BODY" \
            --base master \
            --head qa
