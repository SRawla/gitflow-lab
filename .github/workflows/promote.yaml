name: Promote (Update Values)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote (from build output)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  promote:
    name: "Update ${{ inputs.environment }} to ${{ inputs.image_tag }}"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve values file
        id: resolve
        run: |
          ENV="${{ inputs.environment }}"
          VALUES="chart/tbs/values-${ENV}.yaml"
          echo "values=$VALUES" >> $GITHUB_OUTPUT

      - name: Update image tag in values file
        run: |
          VALUES="${{ steps.resolve.outputs.values }}"
          TAG="${{ inputs.image_tag }}"
          sed -i "s/^  tag: .*/  tag: \"${TAG}\"/" "$VALUES"
          echo "Updated $VALUES to image.tag: $TAG"
          grep "tag:" "$VALUES"

      - name: Create promote branch and PR
        run: |
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.image_tag }}"
          BRANCH="chore/promote-${ENV}-${TAG}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ${{ steps.resolve.outputs.values }}
          git commit -m "chore: promote ${TAG} to ${ENV}"
          git push origin "$BRANCH"

          gh pr create \
            --title "promote: ${TAG} to ${ENV}" \
            --body "Updates ${ENV} environment to image tag ${TAG}. After merge, trigger deploy.yaml for ${ENV} to apply." \
            --base develop \
            --head "$BRANCH" \
            --label "promote"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
