name: PR Checks

on:
  pull_request:
    branches: [develop, qa, master, "release/**"]

jobs:
  validate:
    name: Validate PR
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch name
        env:
          SOURCE: ${{ github.head_ref }}
          TARGET: ${{ github.base_ref }}
        run: |
          echo "PR: $SOURCE -> $TARGET"

          if [[ "$SOURCE" =~ ^(feat|fix|chore)/[a-zA-Z0-9._-]+$ ]] && [[ "$TARGET" == "develop" ]]; then
            echo "Valid: feature/fix/chore -> develop"

          elif [[ "$SOURCE" =~ ^fix/[a-zA-Z0-9._-]+$ ]] && [[ "$TARGET" == "qa" ]]; then
            echo "Valid: fix/* -> qa (QA bug fix)"

          elif [[ "$SOURCE" =~ ^qa-promote/ ]] && [[ "$TARGET" == "qa" ]]; then
            echo "Valid: qa-promote/* -> qa (auto cherry-pick)"

          elif [[ "$SOURCE" == "develop" ]] && [[ "$TARGET" == "qa" ]]; then
            echo "Valid: develop -> qa"

          elif [[ "$SOURCE" == "qa" ]] && [[ "$TARGET" == "master" ]]; then
            echo "Valid: qa -> master (prod promote)"

          elif [[ "$SOURCE" =~ ^(patch|hotfix)/[a-zA-Z0-9._-]+$ ]] && [[ "$TARGET" =~ ^release/.+$ ]]; then
            echo "Valid: patch/hotfix -> release/*"

          elif [[ "$SOURCE" =~ ^release/.+$ ]] && [[ "$TARGET" =~ ^(qa|develop)$ ]]; then
            echo "Valid: release/* -> qa/develop (forward-port)"

          elif [[ "$SOURCE" =~ ^forward-port/ ]] && [[ "$TARGET" =~ ^(qa|develop)$ ]]; then
            echo "Valid: forward-port/* -> qa/develop"

          elif [[ "$SOURCE" =~ ^auto-sync/ ]] && [[ "$TARGET" == "develop" ]]; then
            echo "Valid: auto-sync/* -> develop"

          elif [[ "$SOURCE" =~ ^chore/promote- ]] && [[ "$TARGET" == "develop" ]]; then
            echo "Valid: chore/promote-* -> develop"

          elif [[ "$SOURCE" == "qa" ]] && [[ "$TARGET" == "develop" ]]; then
            echo "Valid: qa -> develop (auto-sync)"

          else
            echo "ERROR: Branch '$SOURCE' is not allowed to merge into '$TARGET'"
            echo "See .ai/01-branching-strategy-context.md for allowed flows."
            exit 1
          fi

      - name: Verify Java 21
        run: |
          JAVA_VER=$(java -version 2>&1 | head -1)
          echo "Java: $JAVA_VER"
          if ! java -version 2>&1 | grep -q '"21'; then
            echo "::error::Java 21 required but found: $JAVA_VER"
            exit 1
          fi
          echo "✅ Java 21 available (machine-installed, no download needed)"

      - name: Build and test
        # No 'clean' — reuses compiled classes from .m2 and target/ if source unchanged.
        # Maven deps already cached in ~/.m2/repository on self-hosted runner.
        run: ./mvnw -B verify
