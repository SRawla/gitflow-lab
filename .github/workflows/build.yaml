name: Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build from (e.g. develop, qa, release/2026.06, v2026.06.1)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: srawla/tbs

jobs:
  build:
    name: "Build from ${{ inputs.ref }}"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      packages: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve image tag
        id: tag
        run: |
          REF="${{ inputs.ref }}"
          RUN="${{ github.run_number }}"

          # If ref looks like a version tag (v*), use it directly
          if [[ "$REF" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]+$ ]]; then
            TAG="$REF"
          else
            # For branches: sanitize slashes and append run number
            SAFE_REF=$(echo "$REF" | sed 's|/|-|g')
            TAG="${SAFE_REF}.${RUN}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Verify Java 21
        run: |
          JAVA_VER=$(java -version 2>&1 | head -1)
          echo "Java: $JAVA_VER"
          if ! java -version 2>&1 | grep -q '"21'; then
            echo "::error::Java 21 required but found: $JAVA_VER"
            exit 1
          fi
          echo "✅ Java 21 available (machine-installed, no download needed)"

      - name: Build JAR
        run: ./mvnw -B -DskipTests clean package

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .

      - name: Load image into kind
        run: |
          kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} --name tbs

      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | ${{ inputs.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | $(git rev-parse --short=7 HEAD) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use this tag in deploy-dev / deploy-qa / deploy-prod workflow." >> $GITHUB_STEP_SUMMARY
