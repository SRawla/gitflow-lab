name: Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        type: choice
        options:
          - develop
          - qa
          - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: srawla/tbs

jobs:
  build:
    name: "Build from ${{ inputs.branch }}"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      packages: write

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Resolve image tag
        id: tag
        run: |
          BRANCH="${{ inputs.branch }}"
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          RUN="${{ github.run_number }}"
          TAG="${BRANCH}.${RUN}.${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: ./mvnw -B -DskipTests clean package

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .

      - name: Load image into kind
        run: |
          kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} --name tbs

      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ inputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | $(git rev-parse --short=7 HEAD) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use this tag in deploy-dev / deploy-qa / deploy-prod workflow." >> $GITHUB_STEP_SUMMARY
