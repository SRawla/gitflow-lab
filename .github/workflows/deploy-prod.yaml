name: Deploy PROD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Release tag to deploy (e.g. v2026.06.0)"
        required: true
        type: string

jobs:
  deploy-prod:
    name: "Deploy ${{ inputs.image_tag }} to PROD"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: read

    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Validate tag format
        run: |
          TAG="${{ inputs.image_tag }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]{4}\.[0-9]{2}\.[0-9]+$'; then
            echo "::error::Invalid tag format '$TAG'. Expected: v{YYYY}.{MM}.{N} (e.g. v2026.06.0)"
            echo "::error::Only release tags are accepted for prod deploy. Branch-based image tags are rejected."
            exit 1
          fi
          echo "✅ Tag format valid: $TAG"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.image_tag }}
          fetch-depth: 1

      - name: Create namespace if missing
        run: |
          kubectl create namespace tbs-prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        run: |
          helm upgrade --install prod chart/tbs \
            -f chart/tbs/values-prod.yaml \
            --set image.tag=${{ inputs.image_tag }} \
            --set image.pullPolicy=IfNotPresent \
            --namespace tbs-prod \
            --wait --timeout 180s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/prod -n tbs-prod --timeout=90s
          echo "Deployed ${{ inputs.image_tag }} to tbs-prod (prod.tbs.local:8080)"

      - name: Smoke test
        run: |
          echo "Waiting for app to become ready..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://prod.tbs.local:8080/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Smoke test passed — /actuator/health returned 200"
              exit 0
            fi
            echo "  attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "::error::Smoke test failed — /actuator/health did not return 200 after 60s"
          kubectl logs deployment/prod -n tbs-prod --tail=50
          exit 1
