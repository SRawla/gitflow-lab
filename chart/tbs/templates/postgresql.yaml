{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tbs.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tbs.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "tbs.fullname" . }}-postgresql
  template:
    metadata:
      labels:
        app: {{ include "tbs.fullname" . }}-postgresql
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.password | quote }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tbs.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ include "tbs.fullname" . }}-postgresql
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
