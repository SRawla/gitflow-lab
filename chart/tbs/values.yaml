# Default values — overridden by values-{dev,qa,prod}.yaml per environment

image:
  registry: ghcr.io
  repository: srawla/tbs
  tag: latest          # overwritten by CI workflow or promote.yaml
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: tbs.local      # overridden per env

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 90
  periodSeconds: 15
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 5

# Application env vars (non-secret)
app:
  springProfile: default

# Database — overridden per env
db:
  url: jdbc:postgresql://localhost:5432/tbs
  username: tbs
  # password comes from Secret, not here

# PostgreSQL — simple deployment using official image
postgresql:
  enabled: true
  image: postgres:16-alpine
  database: tbs
  username: tbs
  password: tbs
