spring:
  application:
    name: tbs

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tbs}
    username: ${DB_USERNAME:tbs}
    password: ${DB_PASSWORD:tbs}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

server:
  port: 8080
